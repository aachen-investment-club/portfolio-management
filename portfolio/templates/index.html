<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary container-fluid p-3">
            <a class="navbar-brand" href="#">Portfolio Management</a>
            <!-- portfolio select dropdown -->
            <div class="ms-auto d-flex gap-3 align-items-center">
                <select id="portfolio-selector" class="form-select" style="width: auto;">
                    <option value="">Select a portfolio...</option>
                </select>
                <button id="upload-new-button" class="btn btn-primary">Upload New</button>
            </div>
        </nav>


        <main class="container-fluid bg-body-red p-5">
            <div class="d-grid gap-3" style="grid-template-columns: 2fr 1fr;">
                <div class="container-fluid p-3 rounded bg-dark-subtle"
                    style="grid-row: 1 / span 2;">
                    <div id="main-chart" class="container-fluid p-0"></div>
                </div>

                <div class="bg-dark-subtle container-fluid 
                    rounded p-3 position-relative">
                    <h5>Sharpe Ratio</h5>
                    <h1 class="position-absolute top-50 start-50 translate-middle">
                        0.0
                    </h1>
                </div>
                
                <div class="bg-dark-subtle container-fluid 
                    rounded p-3 position-relative">
                    <h5>Net Asset Value</h5>
                    <h1 class="position-absolute top-50 start-50 translate-middle">
                        0.0
                    </h1>
                </div>
                
            </div>

            <h2 class="mt-5">My Assets</h2>
            <div id="main-table" 
                class="d-grid container-fluid p-3 bg-dark-subtle rounded" 
                style="grid-template-columns: 2fr repeat(3, 1fr);">
                <div class="font-weight-bold border-bottom border-white">Stock</div>
                <div class="font-weight-bold border-bottom border-white">Current</div>
                <div class="font-weight-bold border-bottom border-white">Shares</div>
                <div class="font-weight-bold border-bottom border-white">Asset Value</div>

                <div id="input-file-form" 
                    class="position-relative flex-column
                    justify-content-center align-items-center" 
                    style="grid-column: 1 / span 4; height: 10em;display: flex;">
                    <input id="input-file" type="file" id="json-file"/>

                    <button id="submit-button">Submit</button>
                </div>
            </div>

            <h2 class="mt-5">My Metrics</h2>
            <div class="d-grid gap-2" style="grid-template-columns: repeat(3, 1fr);">
                <div class="bg-dark-subtle container-fluid 
                    rounded p-3 position-relative"
                    style="height: 10em;">
                    <h5>Metric A</h5>
                    <h1 class="position-absolute top-50 start-50 translate-middle">
                        0.0
                    </h1>
                </div>
                <div class="bg-dark-subtle container-fluid 
                    rounded p-3 position-relative"
                    style="height: 10em;">
                    <h5>Metric B</h5>
                    <h1 class="position-absolute top-50 start-50 translate-middle">
                        0.0
                    </h1>
                </div>
                <div class="bg-dark-subtle container-fluid 
                    rounded p-3 position-relative"
                    style="height: 10em;">
                    <h5>Metric C</h5>
                    <h1 class="position-absolute top-50 start-50 translate-middle">
                        0.0
                    </h1>
                </div>
            </div>
        </main>

        <footer>

        </footer>

        <script src="https://cdn.plot.ly/plotly-3.2.0.min.js" charset="utf-8"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <!-- is /script/index.js correct? because there's no script folder -->
        <script src="/script/index.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </body>
</html>
