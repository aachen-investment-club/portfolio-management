<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary container-fluid p-3">
            <a class="navbar-brand" href="#">Dashboard</a>
        </nav>


        <main class="container-fluid bg-body-red p-5">
            <div class="row g-3">

                <!-- Main Chart -->
                <div class="col-12 col-lg-8">
                    <div class="container-fluid p-3 rounded bg-dark-subtle">
                        <div id="main-chart" class="container-fluid p-0"></div>
                    </div>
                </div>

                <!-- Positions List -->
                 <div class="col-12 col-lg-4">
                    <div class="p-3 rounded bg-dark-subtle h-100">
                        <h4>Positions</h4>
                        <div id="positions-list" class="h-100">
                            <!-- Positions will be dynamically added here -->
                        </div>
                    </div>
                </div>
            </div>
            
            <h2 class="mt-5">Portfolio Metrics</h2>

            <div class="row g-3">
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="metric-card bg-dark-subtle rounded p-3">
                        <h5>Total Return</h5>
                        <h3 id="kpi-total-return">--</h3>
                    </div>
                </div>
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="bg-dark-subtle container-fluid rounded p-3">
                    <h5>CAGR</h5>
                    <h3 id="kpi-cagr">--</h3>
                    </div>
                </div>
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="bg-dark-subtle container-fluid rounded p-3">
                    <h5>Volatility</h5>
                    <h3 id="kpi-volatility">--</h3>
                    </div>
                </div>
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="bg-dark-subtle container-fluid rounded p-3">
                    <h5>Sharpe Ratio</h5>
                    <h3 id="kpi-sharpe">--</h3>
                    </div>
                </div>
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="bg-dark-subtle container-fluid rounded p-3">
                    <h5>Jensen's Alpha</h5>
                    <h3 id="kpi-jalpha">--</h3>
                    </div>
                </div>
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="bg-dark-subtle container-fluid rounded p-3">
                        <h5>Value at Risk</h5>
                        <h3 id="kpi-var">--</h3>
                    </div>
                </div>
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="bg-dark-subtle container-fluid rounded p-3">
                    <h5>Max Drawdown</h5>
                    <h3 id="kpi-maxdrawdown">--</h3>
                    </div>
                </div>
                <div class="col-6 col-sm-4 col-lg-2 metric-item">
                    <div class="bg-dark-subtle container-fluid rounded p-3">
                    <h5>Beta</h5>
                    <h3 id="kpi-beta">--</h3>
                    </div> 
                </div>
            </div>
        </main>

        <footer>

        </footer>

        <script src="https://cdn.plot.ly/plotly-3.2.0.min.js" charset="utf-8"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="/script/index.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </body>
</html>
