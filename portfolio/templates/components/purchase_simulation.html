{% macro PurchaseSimulationPanel(tickers) %}
<div class="bg-dark-subtle rounded p-3 mt-3">
    <h5 class="mb-3">Purchase Simulation</h5>

    <div class="mb-2">
        <label class="form-label small">Buy Date</label>
        <input id="sim-date" type="date" class="form-control form-control-sm">
    </div>

    <div class="mb-2">
        <label class="form-label small">Ticker</label>
        <input id="sim-ticker" 
            class="form-control form-control-sm" placeholder="Filter">
        <select id="sim-ticker-select" 
            class="form-select form-control-sm" placeholder="NVDA, AAPL, TSLA">
            {% for ticker in tickers %}
                <option value="{{ticker}}">{{ticker}}</option>
            {% endfor%}
        </select>
    </div>

    <div class="mb-2">
        <label class="form-label small">Cash ($)</label>
        <input id="sim-cash" type="number" class="form-control form-control-sm" value="10000">
    </div>

    <div class="d-flex gap-2 mt-3">
        <button class="btn btn-warning btn-sm flex-fill" onclick="simulate()">Simulate</button>
        <button class="btn btn-secondary btn-sm flex-fill" onclick="undo()">Undo</button>
    </div>
</div>

<script>
    const tickers = {{ tickers | safe }};
    const sim_ticker_select = document.getElementById("sim-ticker-select");
    const sim_ticker = document.getElementById("sim-ticker");
    function tickerOnChangeHandler(e) {
        const val = e.target.value.toUpperCase();
        const filteredTickers = val.length > 0 ? tickers.filter(x => x.includes(val)) : tickers;
        console.log(e)
        sim_ticker_select.innerHTML = '';
        for (const ticker of filteredTickers) {
            const option = document.createElement("option")
            option.value = ticker;
            option.innerHTML = ticker;
            sim_ticker_select.appendChild(option);
        }
    }
    sim_ticker.addEventListener("input", tickerOnChangeHandler);
</script>


{% endmacro %}
