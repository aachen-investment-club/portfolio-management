{% macro PurchaseSimulationPanel(tickers, ticker_to_name, selected_base_currency) %}
<div class="bg-dark-subtle rounded p-3 mt-3">
    <h5 class="mb-3">Purchase Simulation</h5>

    <div class="mb-2">
        <label class="form-label small">Buy Date</label>
        <input id="sim-date" type="date" class="form-control form-control-sm">
    </div>

    <div class="mb-2">
        <label class="form-label small">Ticker</label>
        <input id="sim-ticker" 
            class="form-control form-control-sm" placeholder="Filter">
        <select id="sim-ticker-select" 
            class="form-select form-control-sm" placeholder="NVDA, AAPL, TSLA">
            {% for ticker, shortname in ticker_to_name.items()%}
                <option value="{{ticker}}">{{shortname}}</option>
            {% endfor%}
        </select>
    </div>

    <div class="form-group">
    <label for="base-currency">Base Currency</label>
    <select id="base-currency" class="form-control">
        <option value="USD" {% if selected_base_currency == "USD" %}selected{% endif %}>USD</option>
        <option value="EUR" {% if selected_base_currency == "EUR" %}selected{% endif %}>EUR</option>
        <option value="GBP" {% if selected_base_currency == "GBP" %}selected{% endif %}>GBP</option>
        <option value="JPY" {% if selected_base_currency == "JPY" %}selected{% endif %}>JPY</option>
        <option value="CHF" {% if selected_base_currency == "CHF" %}selected{% endif %}>CHF</option>
        <option value="AUD" {% if selected_base_currency == "AUD" %}selected{% endif %}>AUD</option>
        <option value="CNH" {% if selected_base_currency == "CNH" %}selected{% endif %}>CNH</option>
    </select>
    </div>

    <div class="mb-2">
        <label class="form-label small">Cash ($)</label>
        <input id="sim-cash" type="number" class="form-control form-control-sm" value="10000">
    </div>

    <div class="d-flex gap-2 mt-3">
        <button class="btn btn-warning btn-sm flex-fill" onclick="simulate()">Simulate</button>
        <button class="btn btn-secondary btn-sm flex-fill" onclick="undo()">Undo</button>
    </div>
</div>
{% endmacro %}
