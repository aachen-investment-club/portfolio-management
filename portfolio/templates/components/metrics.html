{% macro MetricCard(label, value, id=None, description=None) %}
<div class="col-12 col-sm-6 col-lg-3 col-xl-2 metric-item">
    <div class="bg-dark-subtle container-fluid rounded p-3 h-100">
        <div class="d-flex align-items-start justify-content-between gap-2">
            <h5 class="mb-2">{{ label }}</h5>
            {% if description %}
            <button
                type="button"
                class="btn btn-sm btn-outline-secondary metric-info-btn"
                data-bs-toggle="popover"
                data-bs-trigger="hover focus"
                data-bs-placement="top"
                data-bs-custom-class="metric-popover"
                data-bs-content="{{ description }}"
                aria-label="Explain {{ label }}"
            >
                ?
            </button>
            {% endif %}
        </div>
        <div {% if id %}id="{{ id }}"{% endif %}>
            <div class="metric-real">
                <h3 class="mb-0">{{ value }}</h3>
            </div>
            <div class="metric-sim text-warning small d-none"></div>
        </div>
    </div>
</div>
{% endmacro %}
