{% macro MetricCard(label, value, id=None) %}
<div class="col-12 col-sm-6 col-lg-3 col-xl-2 metric-item">

    <div class="bg-dark-subtle container-fluid rounded p-3">
        <h5>{{ label }}</h5>
        <div {% if id %}id="{{ id }}"{% endif %}>
            <div class="metric-real">
                <h3 class="mb-0">{{ value }}</h3>
            </div>
            <div class="metric-sim text-warning small d-none"></div>
        </div>
    </div>
</div>
{% endmacro %}
