version: 0.0
os: linux
files:
  - source: scripts/
    destination: /home/ec2-user/deploy-scripts
hooks:
  ApplicationStart:        # Use ApplicationStart instead of AfterInstall
    - location: scripts/deploy.sh
      timeout: 300
      runas: root          # Root has docker permissions and can write to system
      environment:
        CONTAINER_NAME: "portfolio-app"
        HOST_PORT: "80"    # Expose on common HTTP port
        CONTAINER_PORT: "5000"
        DB_HOST_ALIAS: "db-host"