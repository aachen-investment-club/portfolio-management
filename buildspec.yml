version: 0.2


env:
  secrets-manager: 
    APCA_API_KEY_ID: "portfolio/APCA_API_KEY_ID:APCA_API_KEY_ID" 
    APCA_API_SECRET_KEY: "portfolio/APCA_API_SECRET_KEY:APCA_API_SECRET_KEY" 

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
  build:
    commands:
      - docker build --build-arg APCA_API_KEY_ID=$APCA_API_KEY_ID --build-arg APCA_API_SECRET_KEY=$APCA_API_SECRET_KEY -t $ECR_REPO_URI:latest .
      - docker tag $ECR_REPO_URI:latest $ECR_REPO_URI:$IMAGE_TAG
  post_build:
    commands:
      - docker push $ECR_REPO_URI:latest
      - docker push $ECR_REPO_URI:$IMAGE_TAG
artifacts:
  files:
    - appspec.yml
    - scripts/*
